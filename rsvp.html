    <meta name="twitter:card" content="summary_large_image" />

      name="twitter:description"
      content="RSVP to Rosie and Joe's wedding on 17 April 2027."
    />
    <meta name="twitter:image" content="https://rosieandjoe.uk/images/eyam-hall-small.png" />

    <!-- Google Fonts: Cormorant (Light Italic display) + Cormorant SC (labels)
       + Spectral (body) + Jost (utility) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;1,300;1,400&family=Cormorant+SC:wght@300;400&family=Spectral:ital,wght@0,300;0,400;1,300&family=Jost:wght@200;300&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <meta name="theme-color" content="#A8573D" />
    <script src="js/components.js"></script>
  </head>
  <body>
    <a class="skip-link" href="#main">Skip to content</a>
    <site-header></site-header>

    <main id="main">
      <div class="page-header reveal">
        <span class="eyebrow">RSVP</span>
        <h1>Will You Join Us?</h1>
        <p>
          We can't wait to celebrate with you. Please let us know whether you
          can make it by <strong>Saturday 16 January 2027</strong> using the
          form below.
        </p>
      </div>

      <section class="section section--alt reveal">
        <div class="container">
          <div class="embed">
            <div class="embed__frame">
              <iframe
                src="https://docs.google.com/forms/d/e/1FAIpQLSd212eAd0eDGJOYvhtMEv9YTyGXgG5GDgC9-brmLE3mpBcP6w/viewform?embedded=true"
                width="100%"
                height="900"
                frameborder="0"
                marginheight="0"
                marginwidth="0"
                title="Wedding RSVP form"
                >Loading…</iframe
              >
            </div>
          </div>
        </div>
      </section>

      <!-- Ceremony image — The Flagged Hall
      The Hall is a beautiful place to hold your wedding ceremony in any season. Bathed in sunlight in the Summer and made
      cosy by the flickering log fire in Winter, this enchanting Derbyshire Hall can accommodate civil wedding ceremonies 
      or up to 60 guests. -->
      <figure class="figure figure--bleed figure--banner reveal">
        <img
          class="figure__img"
          src="images/eyam-hall-flagged-hall.png"
          alt="The flagged hall at Eyam Hall."
          loading="lazy"
        />
        <figcaption class="figure__caption">
          The Flagged Hall &middot; Eyam Hall's inside ceremony space
        </figcaption>
      </figure>

    </main>

    <site-footer></site-footer>

    <script src="js/main.js"></script>
  </body>
</html>
