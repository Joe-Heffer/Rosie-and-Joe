name: CI

on:
  push:
  pull_request:

jobs:
  html-proofer:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
      - run: gem install html-proofer
      - run: >
          htmlproofer . --disable-external
          --ignore-files "./cake/index.html"
        env:
          LANG: C.UTF-8

  js-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: node --check js/main.js
